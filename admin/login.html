<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - 旭丘一丁目町会 管理画面</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2c5530 0%, #4CAF50 100%);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px 30px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 36px;
        }
        .login-title {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-control {
            width: 100%;
        }
        .remember-me {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
        }
        .forgot-password:hover {
            text-decoration: underline;
        }
        .help-link {
            display: block;
            margin-top: 22px;
            padding: 16px;
            text-align: center;
            background: #fff6e8;
            border: 2px solid #FF9800;
            border-radius: 12px;
            color: #c2410c;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            line-height: 1.5;
        }
        .help-link:active {
            background: #ffe9c7;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🏘️</div>
                <h1 class="login-title">旭丘一丁目町会</h1>
                <p class="login-subtitle">管理画面へログイン</p>
            </div>

            <form action="index.html" method="post">
                <div class="form-group">
                    <label for="email" class="form-label">メールアドレス</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">パスワード</label>
                    <input type="password" id="password" class="form-control" placeholder="パスワードを入力" required>
                </div>

                <div class="remember-me">
                    <a href="#" class="forgot-password">パスワードを忘れた方</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    ログイン
                </button>
            </form>

            <a href="help.html" class="help-link">
                📱 はじめての方へ — つかいかた動画を見る
            </a>
        </div>

        <p style="text-align: center; color: white; margin-top: 20px; font-size: 12px;">
            © 2025 東京都練馬区旭丘一丁目町会
        </p>
    </div>

    <!-- Supabase JS SDK (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Supabase クライアント初期化 -->
    <script src="js/supabase-client.js"></script>

    <!-- ログイン処理 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            const submitBtn = form.querySelector('[type="submit"]');
            const emailInput = document.querySelector('#email');
            const passwordInput = document.querySelector('#password');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    alert('メールアドレスとパスワードを入力してください');
                    return;
                }

                // UI フィードバック
                submitBtn.disabled = true;
                submitBtn.textContent = 'ログイン中...';

                try {
                    // Supabase にログイン
                    const result = await supabaseClient.signIn(email, password);

                    if (result.success) {
                        // ユーザー情報をlocalStorageに保存（認証状態を維持）
                        localStorage.setItem('asahigaoka_user', JSON.stringify({
                            id: result.user.id,
                            email: result.user.email,
                            name: result.user.name,
                            role: result.user.role
                        }));

                        // ロール情報をセッションに保存
                        localStorage.setItem('asahigaoka_user_role', result.user.role);

                        // デバイス判定してリダイレクト
                        console.log('ログイン成功:', email);
                        if (window.innerWidth <= 768) {
                            window.location.href = 'mobile.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    } else {
                        // ログイン失敗
                        alert('ログインに失敗しました。\n' + result.error);
                        console.error('ログインエラー:', result.error);
                    }
                } catch (error) {
                    console.error('予期しないエラー:', error);
                    alert('予期しないエラーが発生しました: ' + error.message);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'ログイン';
                }
            });

            // パスワード忘れたリンク（将来実装）
            document.querySelector('.forgot-password').addEventListener('click', function(e) {
                e.preventDefault();
                alert('パスワード リセット機能は準備中です。\n管理者にお問い合わせください。');
            });
        });
    </script>
</body>
</html>
